{% set name = "eoreader" %}
{% set version = "0.23.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/eoreader-{{ version }}.tar.gz
  sha256: 8e55db2e69afcc48df758b4518ac08286db899b7752bac83ac46d6644dbbcf9b

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - setuptools
    - python {{ python_min }}
  run:
    - python >={{ python_min }}
    - geopandas >=0.14.4
    - lxml
    - h5netcdf
    - rasterio >=1.3.10
    - xarray >=2024.06.0
    - rioxarray >=0.15.0
    - odc-geo >=0.5.0
    - rtree
    - cloudpathlib-s3 >=0.15.0
    - sertit >=1.50.2
    - validators
    - matplotlib-base
    - methodtools
    - spyndex >=0.7.1
    - pyresample
    - zarr
    - dicttoxml
    - tifffile
    - ephem
    # stac    
    - pystac
    - xdem >=0.1.4

test:
  imports:
    - eoreader
    - eoreader.bands
    - eoreader.stac
    - eoreader.products
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: http://github.com/sertit/eoreader/
  summary: Remote-sensing opensource python library reading optical and SAR sensors, loading and stacking bands, clouds, DEM and index.
  license: Apache-2.0
  license_file: LICENSE
  description: Remote-sensing opensource python library reading optical and SAR sensors, loading and stacking bands, clouds, DEM and index.
  doc_url: https://eoreader.readthedocs.io/en/latest/
  dev_url: http://github.com/sertit/eoreader

extra:
  recipe-maintainers:
    - Alt-o
    - bastiencyr
    - qpoterek
    - remi-braun
